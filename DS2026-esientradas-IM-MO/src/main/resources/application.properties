spring.application.name=esientradas
usuarios.service.url=http://localhost:8081

# BASE DE DATOS
spring.datasource.url=jdbc:mysql://localhost:3306/esientradas?serverTimezone=UTC&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&maxAllowedPacket=134217728
spring.datasource.username=root
spring.datasource.password=${DB_ENTRADAS_PASSWORD}

# HIBERNATE CONFIG
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# 🔒 SEGURIDAD A02: PREVENCIÓN DE FUGAS DE INFORMACIÓN
# Antes estaba en 'always', ahora ocultamos detalles técnicos al usuario final
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# LOGGING (Mantener solo en desarrollo, desactivar en producción)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# STRIPE (Protegidos mediante variables de entorno)
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}

# USUARIO ADMINISTRADOR
app.security.admin-email=${APP_SECURITY_ADMIN_EMAIL:}